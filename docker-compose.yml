version: "3.9"

services:
  db:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutridz
      POSTGRES_USER: nutridz_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutridz_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/seeds:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutridz_user -d nutridz"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nutridz_user:${POSTGRES_PASSWORD:-nutridz_dev_2026}@db:5432/nutridz
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLOUDFLARE_R2_ACCESS_KEY: ${CLOUDFLARE_R2_ACCESS_KEY:-}
      CLOUDFLARE_R2_SECRET_KEY: ${CLOUDFLARE_R2_SECRET_KEY:-}
      CLOUDFLARE_R2_BUCKET: ${CLOUDFLARE_R2_BUCKET:-nutridz}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app

volumes:
  postgres_data:
