spring.application.name=nutri-dz-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/nutridz_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nutridz_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:nutridz_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.jooq.sql-dialect=MYSQL

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:nutridz_user}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:nutridz_pass}

jwt.secret=${JWT_SECRET:nutridz-super-secret-key-oooo33-in-production-minimum-256-bits}
jwt.expiration=86400000

ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Allow larger JSON bodies (for base64 avatars and similar inline media)
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true

app.base-url=${APP_BASE_URL:http://localhost:8080}

logging.level.lydiacharif.nutridzbackend=DEBUG
logging.level.org.jooq.tools.LoggerListener=DEBUG